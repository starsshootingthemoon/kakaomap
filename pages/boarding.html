<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>탑승 보조</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="boarding.css">
</head>
<body>

  <div id="boarding-screen" class="boarding-screen is-wrong">

    <!-- 지도 배경 -->
    <div class="map-wrap" aria-hidden="true">
      <img
        id="map-bg"
        class="map-bg"
        src="https://www.figma.com/api/mcp/asset/9b05a7f2-fd48-475c-aa27-2a9048db8fb3"
        alt=""
      >
      <!-- 오류 상태 반투명 빨간 오버레이 -->
      <div class="wrong-overlay" aria-hidden="true"></div>
    </div>

    <!-- 현재위치 마커 (CSS) -->
    <div class="loc-marker" aria-hidden="true">
      <div class="pulse pulse-lg"></div>
      <div class="pulse pulse-md"></div>
      <div class="pulse pulse-sm"></div>
      <div class="loc-dot"></div>
      <div class="loc-arrow"></div>
    </div>

    <!-- 택시 출발 핀 (오류 상태에서만) -->
    <div class="taxi-pin" aria-hidden="true">
      <div class="pin-chip">출발</div>
      <div class="pin-stem"></div>
      <div class="pin-foot"></div>
    </div>

    <!-- 상태 배너 -->
    <div
      id="alert-banner"
      class="alert-banner"
      role="alert"
      aria-live="assertive"
      aria-atomic="true"
    >
      <div class="banner-inner">
        <div class="warn-icon" aria-hidden="true">
          <svg viewBox="0 0 60 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M30 4L57 52H3L30 4Z"
              stroke="white" stroke-width="3.5"
              stroke-linejoin="round" fill="none"/>
            <rect x="27.5" y="20" width="5" height="16" rx="2.5" fill="white"/>
            <circle cx="30" cy="44" r="3" fill="white"/>
          </svg>
        </div>
        <p id="banner-text" class="banner-text">탑승 위치와 현위치가<br>반대입니다</p>
      </div>
    </div>

  </div>

  <!-- 스크린리더 안내 -->
  <div
    class="sr-only"
    id="sr-announce"
    role="status"
    aria-live="assertive"
    aria-atomic="true"
  ></div>

  <script src="../js/boarding.js"></script>
</body>
</html>
